name: Build and Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc nasm make

    - name: Build compiler
      run: gcc -o minic *.c

    - name: Run hello demo
      run: |
        ./minic demo/hello.c > hello.s
        nasm -f elf32 hello.s -o hello.o
        gcc -m32 hello.o -o hello
        ./hello
        [ $? -eq 42 ] && echo "✓ hello test passed" || exit 1

    - name: Run factorial demo
      run: |
        ./minic demo/factorial.c > factorial.s
        nasm -f elf32 factorial.s -o factorial.o
        gcc -m32 factorial.o -o factorial
        ./factorial
        [ $? -eq 120 ] && echo "✓ factorial test passed" || exit 1

    - name: Run fibonacci demo
      run: |
        ./minic demo/fibonacci.c > fibonacci.s
        nasm -f elf32 fibonacci.s -o fibonacci.o
        gcc -m32 fibonacci.o -o fibonacci
        ./fibonacci
        [ $? -eq 55 ] && echo "✓ fibonacci test passed" || exit 1

    - name: Run prime demo
      run: |
        ./minic demo/prime.c > prime.s
        nasm -f elf32 prime.s -o prime.o
        gcc -m32 prime.o -o prime
        ./prime
        [ $? -eq 1 ] && echo "✓ prime test passed" || exit 1

    - name: Upload artifacts
      uses: actions/upload-artifact@v3
      with:
        name: executables
        path: hello factorial fibonacci prime
