name: Build and Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc nasm make gcc-multilib

    - name: Build compiler
      run: gcc -Wall -Wextra -std=c99 -o minic *.c

    - name: Test hello
      run: |
        ./minic demo/hello.c > hello.s
        nasm -f elf32 hello.s -o hello.o
        gcc -m32 hello.o -o hello
        ./hello
        RESULT=$?
        echo "Exit code: $RESULT"
        [ $RESULT -eq 42 ] && echo "✓ hello test passed" || echo "✗ hello test failed"

    - name: Test factorial
      run: |
        ./minic demo/factorial.c > factorial.s
        nasm -f elf32 factorial.s -o factorial.o
        gcc -m32 factorial.o -o factorial
        ./factorial
        RESULT=$?
        echo "Exit code: $RESULT"
        [ $RESULT -eq 120 ] && echo "✓ factorial test passed" || echo "✗ factorial test failed"

    - name: Test fibonacci
      run: |
        ./minic demo/fibonacci.c > fibonacci.s
        nasm -f elf32 fibonacci.s -o fibonacci.o
        gcc -m32 fibonacci.o -o fibonacci
        ./fibonacci
        RESULT=$?
        echo "Exit code: $RESULT"
        [ $RESULT -eq 55 ] && echo "✓ fibonacci test passed" || echo "✗ fibonacci test failed"

    - name: Test prime
      run: |
        ./minic demo/prime.c > prime.s
        nasm -f elf32 prime.s -o prime.o
        gcc -m32 prime.o -o prime
        ./prime
        RESULT=$?
        echo "Exit code: $RESULT"
        [ $RESULT -eq 1 ] && echo "✓ prime test passed" || echo "✗ prime test failed"
