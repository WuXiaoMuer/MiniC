name: Build and Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc nasm make gcc-multilib

    - name: Build compiler
      run: gcc -Wall -Wextra -std=c99 -o minic *.c

    - name: Test hello (basic)
      run: |
        echo "Testing hello.c..."
        set -x  # Echo commands
        timeout 10 ./minic demo/hello.c > hello.s 2>&1 || {
            echo "Exit code: $?"
            cat hello.s || true
            exit 1
        }
        cat hello.s
        nasm -f elf32 hello.s -o hello.o
        gcc -m32 hello.o -o hello
        ./hello
        RESULT=$?
        echo "Exit code: $RESULT"
        [ $RESULT -eq 42 ] && echo "✓ hello test passed" || echo "✗ hello test failed (expected 42, got $RESULT)"
