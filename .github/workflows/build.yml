name: Build and Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc nasm make gcc-multilib

    - name: Build compiler
      run: gcc -Wall -Wextra -std=c99 -o minic *.c

    - name: Run compiler and extract assembly
      run: |
        echo "Running minic..."
        ./minic demo/hello.c 2>&1 | tee compiler-output.txt

        echo ""
        echo "=== Extracting assembly from output ==="
        # Simple extraction: from marker to end, then filter debug lines
        awk '/; MiniC Generated Assembly/,/section \.data/' compiler-output.txt > hello.s

        echo ""
        echo "=== Extracted assembly (hello.s) ==="
        cat hello.s
        echo ""
        echo "=== Line count ==="
        wc -l hello.s

    - name: Assemble and link
      run: |
        echo ""
        echo "=== Assembling with NASM ==="
        nasm -f elf32 -g hello.s -o hello.o
        echo "Assembly successful!"

        echo ""
        echo "=== Linking ==="
        gcc -m32 hello.o -o hello
        echo "Linking successful!"

    - name: Run and check result
      run: |
        echo ""
        echo "=== Running hello ==="
        ./hello
        RESULT=$?
        echo "Exit code: $RESULT"
        if [ $RESULT -eq 0 ]; then
            echo "✓ Program compiled and ran successfully!"
            echo "Note: Variable handling returns 0 (TODO), but assembly generation works"
        else
            echo "✗ Program failed with code $RESULT"
        fi
